<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Zuma Stok per Area</title>
<style>
:root {
  --accent: #00E273;
  --accent-dark: #00c463;
  --accent-soft: rgba(0,226,115,0.12);
  --navy: #002A3A;
  --navy-soft: rgba(0,42,58,0.06);
  --gold: #D4A24C;
  --gold-soft: rgba(212,162,76,0.18);
  --bg: #f6f7f9;
  --card: #ffffff;
  --border: #e5e7eb;
  --border-soft: #f1f5f9;
  --muted: #f8fafc;
  --fg: #0f172a;
  --fg-muted: #1f2937;
  --fg-soft:  #334155;
  --danger: #ef4444;
  --warning: #f59e0b;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 6px rgba(0,0,0,0.05);
  --radius: 4px;
  --radius-sm: 3px;
  --radius-pill: 999px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", system-ui, sans-serif;
  font-size: 14px;
  color: var(--fg);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

.tabular { font-variant-numeric: tabular-nums; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,42,58,0.25); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,42,58,0.45); }

/* ======= TOP STRIP ======= */
.top-strip {
  height: 3px;
  background: linear-gradient(90deg, var(--navy) 0%, var(--navy) 35%, var(--accent) 100%);
}

/* ======= SHELL ======= */
.shell { max-width: 1700px; margin: 0 auto; padding: 18px 22px 40px; }

/* ======= HEADER ======= */
.header {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--navy);
  padding: 12px 16px;
  border-radius: var(--radius);
  margin-bottom: 12px;
  color: #fff;
  gap: 14px; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px 6px 18px 6px;
  display: flex; align-items: center; justify-content: center;
  color: var(--navy); font-weight: 900; font-size: 14px;
  letter-spacing: -0.04em;
}
.brand-title { font-size: 16px; font-weight: 600; letter-spacing: -0.015em; color: #fff; }
.brand-sub { font-size: 10px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 0.14em; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.header .pill { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
.header .pill strong { color: #fff; }
.pill {
  font-size: 10px; color: var(--fg-muted);
  background: var(--muted); border: 1px solid var(--border);
  padding: 4px 10px; border-radius: var(--radius-sm);
  display: inline-flex; align-items: center; gap: 6px;
}
.pill strong { color: var(--fg); font-weight: 600; }

/* Entity pills in header (replace free-form buttons) */
.entity-bar { display: flex; gap: 3px; padding: 3px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-sm); }
.entity-btn {
  font: inherit; font-size: 11px; font-weight: 600;
  padding: 5px 11px; background: transparent; border: none;
  border-radius: 2px; color: rgba(255,255,255,0.6); cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.02em;
}
.entity-btn:hover { color: #fff; }
.entity-btn.active { background: var(--accent); color: var(--navy); box-shadow: 0 1px 2px rgba(0,0,0,0.15); }

/* ======= TAB NAV (area) ======= */
.tab-nav {
  display: flex; flex-wrap: wrap; gap: 4px;
  background: var(--card);
  border: 1px solid var(--border);
  padding: 5px;
  border-radius: var(--radius);
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  width: fit-content;
}
.tab-btn {
  font: inherit; font-size: 11.5px; font-weight: 600;
  padding: 7px 16px;
  background: transparent; border: none;
  border-radius: var(--radius-pill);
  color: var(--fg-muted); cursor: pointer;
  transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: 0.01em;
}
.tab-btn:hover { color: var(--fg); background: var(--muted); }
.tab-btn.active {
  color: #fff; background: var(--navy);
  box-shadow: 0 1px 3px rgba(0,42,58,0.35), inset 0 -2px 0 var(--accent);
}

/* ======= FILTER BAR ======= */
.filter-bar {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin-bottom: 10px;
  display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end;
  box-shadow: var(--shadow-sm);
}
.filter-group { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
.filter-group.flex { flex: 1; min-width: 220px; }
.filter-label {
  font-size: 9px; font-weight: 700; color: var(--fg-muted);
  text-transform: uppercase; letter-spacing: 0.12em;
}
.filter-input, .filter-select {
  font: inherit; font-size: 12px;
  padding: 5px 8px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--card); color: var(--fg);
  outline: none; cursor: pointer;
  transition: border 0.15s;
  min-width: 0;
}
.filter-input:focus, .filter-select:focus { border-color: var(--accent); }
.filter-input[type="text"], .filter-input[type="search"] { cursor: text; }

.toggle-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.toggle-chip {
  font-size: 10.5px; font-weight: 600;
  padding: 5px 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: var(--card);
  color: var(--fg-muted); cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px;
  user-select: none; transition: all 0.15s;
}
.toggle-chip:hover { border-color: var(--accent); }
.toggle-chip input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; margin: 0; }
.toggle-chip.on { border-color: var(--accent); background: var(--accent-soft); color: var(--navy); }
.legend { font-size: 10px; color: var(--fg-soft); margin-left: auto; letter-spacing: 0.02em; }
.legend .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; vertical-align: middle; margin-right: 3px; }

/* ======= KPI GRID ======= */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 12px;
}
@media (max-width: 900px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
.kpi-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px 10px;
  box-shadow: var(--shadow-sm);
  display: flex; flex-direction: column; gap: 4px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.kpi-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
.kpi-card.kpi-primary {
  background: linear-gradient(180deg, var(--navy) 0%, #003c53 100%);
  border-color: var(--navy);
  color: #fff;
}
.kpi-card.kpi-primary .kpi-label { color: rgba(255,255,255,0.6); }
.kpi-card.kpi-primary .kpi-value { color: #fff; }
.kpi-card.kpi-primary .kpi-sub { color: rgba(255,255,255,0.55); }
.kpi-label {
  font-size: 9px; font-weight: 700;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}
.kpi-value-wrap {
  display: inline-block;
  padding-bottom: 4px;
  border-bottom: 2px solid var(--accent);
  margin-bottom: 1px;
}
.kpi-value {
  font-size: 15px; font-weight: 700;
  color: var(--fg); letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
}
.kpi-sub { font-size: 10px; color: var(--fg-soft); font-variant-numeric: tabular-nums; }

/* ======= CARD ======= */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.card-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  flex-wrap: wrap;
}
.card-title {
  font-size: 10px; font-weight: 700;
  color: var(--fg);
  text-transform: uppercase;
  letter-spacing: 0.15em;
}
.card-meta { font-size: 11px; color: var(--fg-soft); font-variant-numeric: tabular-nums; }

.btn {
  font: inherit; font-size: 11px; font-weight: 600;
  padding: 5px 11px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--card); color: var(--fg-muted);
  cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.15s;
}
.btn:hover { background: var(--muted); color: var(--fg); }
.btn-primary { background: var(--navy); color: #fff; border-color: var(--navy); }
.btn-primary:hover { background: #003c53; color: #fff; }

/* ======= TABLE WRAPPER ======= */
.table-wrap {
  overflow: auto; max-height: 78vh;
  border-top: 1px solid var(--border-soft);
}

/* Table uses extensive inline styling for sticky columns — kept from original logic. */

/* ======= LOADING ======= */
#api-loading-overlay {
  position: fixed; inset: 0; background: rgba(246,247,249,0.97);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-bottom: 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loadingProgressWrap {
  width: 240px; height: 4px; background: var(--border);
  border-radius: 10px; overflow: hidden; margin-top: 10px;
}
#loadingProgressBar {
  width: 0%; height: 100%;
  background: linear-gradient(90deg, var(--navy), var(--accent));
  border-radius: 10px; transition: width 0.4s ease;
}
#loadingStatus { font-size: 11.5px; color: var(--fg-muted); margin-top: 8px; font-weight: 500; }
#loadingPercent { font-size: 10px; color: var(--fg-soft); margin-top: 3px; font-weight: 600; letter-spacing: 0.05em; }

/* ======= FOOTER ======= */
.footer {
  display: flex; align-items: center; gap: 8px;
  padding-top: 16px; margin-top: 16px;
  border-top: 1px solid var(--border);
  font-size: 10px; color: var(--fg-muted);
}
.footer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
</style>
</head>
<body>

<div id="api-loading-overlay">
  <div class="spinner"></div>
  <div style="font-weight:600;font-size:12px;color:var(--fg);">Memuat data</div>
  <div id="loadingProgressWrap"><div id="loadingProgressBar"></div></div>
  <div id="loadingStatus">Menghubungi server…</div>
  <div id="loadingPercent">0%</div>
</div>

<div class="top-strip"></div>

<div class="shell">

  <!-- HEADER -->
  <header class="header">
    <div class="brand">
      <div class="brand-mark">Z</div>
      <div>
        <div class="brand-title">Zuma Stok per Area</div>
        <div class="brand-sub">Warehouse · Retail · Consignment — agregasi zona logistik</div>
      </div>
    </div>
    <div class="header-right">
      <div class="entity-bar" id="entityToggleBar">
        <button class="entity-btn active" data-entity="DDD" onclick="selectEntity('DDD')">DDD</button>
        <button class="entity-btn" data-entity="MBB" onclick="selectEntity('MBB')">MBB</button>
        <button class="entity-btn" data-entity="UBB" onclick="selectEntity('UBB')">UBB</button>
        <button class="entity-btn" data-entity="LJBB" onclick="selectEntity('LJBB')">LJBB</button>
      </div>
      <span class="pill">Data per <strong id="data-snapshot-date">—</strong></span>
    </div>
  </header>

  <!-- AREA TABS -->
  <div class="tab-nav" id="sbaAreaTabs"></div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-group flex">
      <label class="filter-label" for="sbaSearchInput">Cari</label>
      <input type="text" id="sbaSearchInput" class="filter-input" placeholder="Kode / kode kecil / nama barang" oninput="renderStockByArea()">
    </div>
    <div class="filter-group">
      <label class="filter-label" for="sbaTierFilter">Tier</label>
      <select id="sbaTierFilter" class="filter-select" onchange="renderStockByArea()"><option value="">Semua Tier</option></select>
    </div>
    <div class="filter-group">
      <label class="filter-label" for="sbaVersionFilter">Version</label>
      <select id="sbaVersionFilter" class="filter-select" onchange="renderStockByArea()"><option value="">Semua Version</option></select>
    </div>
    <div class="filter-group">
      <label class="filter-label">Opsi</label>
      <label class="toggle-chip"><input type="checkbox" id="sbaHideEmpty" onchange="renderStockByArea()">Sembunyikan total=0</label>
    </div>
  </div>

  <!-- COLUMN TOGGLES -->
  <div class="filter-bar">
    <div class="filter-group">
      <label class="filter-label">Tampilkan kolom</label>
      <div class="toggle-row">
        <label class="toggle-chip on" id="sbaChipWH"><input type="checkbox" id="sbaShowWH" checked onchange="sbaUpdateChips();renderStockByArea()"> Warehouse</label>
        <label class="toggle-chip on" id="sbaChipToko"><input type="checkbox" id="sbaShowToko" checked onchange="sbaUpdateChips();renderStockByArea()"> Retail</label>
        <label class="toggle-chip on" id="sbaChipConsig"><input type="checkbox" id="sbaShowConsig" checked onchange="sbaUpdateChips();renderStockByArea()"> Consignment</label>
        <span class="legend"><span class="dot" style="background:#ef4444"></span>≤0 <span class="dot" style="background:#f59e0b;margin-left:6px"></span>1–5 <span class="dot" style="background:#00E273;margin-left:6px"></span>≥6</span>
      </div>
    </div>
  </div>

  <!-- KPI -->
  <div class="kpi-grid" id="sbaSummary"></div>

  <!-- TABLE CARD -->
  <div class="card">
    <div class="card-header">
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <div class="card-title">Stok per SKU</div>
        <div class="card-meta" id="sbaCountInfo">—</div>
      </div>
      <button class="btn btn-primary" onclick="exportStockByAreaCSV()">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v9M4 7l4 4 4-4M2 14h12"/></svg>
        Export CSV
      </button>
    </div>
    <div class="table-wrap">
      <table id="sbaTable" style="border-collapse:separate;border-spacing:0;font-size:11.5px;width:max-content;min-width:100%;">
        <thead id="sbaThead" style="position:sticky;top:0;z-index:5;"></thead>
        <tbody id="sbaTbody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer">
    <span class="footer-dot"></span>
    <span>Sumber data: <strong style="color:var(--fg)">srv1346756.hstgr.cloud</strong> · Dipisahkan dari stock-inventory-dashboard</span>
  </div>

</div>

<script>
const API_BASE = 'https://srv1346756.hstgr.cloud';
const API_KEY = '97d25067-a2ca-44ba-ac5b-61539b627271';

async function fetchAPI(path) {
    const res = await fetch(API_BASE + path, { headers: { 'X-API-Key': API_KEY } });
    if (!res.ok) throw new Error('API error ' + res.status + ' for ' + path);
    return res.json();
}

// Global state
let allData = {};
let storeAreaMap = {};
let consignmentStockItems = [];
let currentEntity = 'DDD';

async function loadDashboardData() {
    const loadingEl = document.getElementById('api-loading-overlay');
    if (loadingEl) loadingEl.style.display = 'flex';
    var _total = 3, _done = 0;
    function progress(label) {
        _done++;
        var pct = Math.round((_done / _total) * 100);
        var bar = document.getElementById('loadingProgressBar');
        var pctEl = document.getElementById('loadingPercent');
        var statusEl = document.getElementById('loadingStatus');
        if (bar) bar.style.width = pct + '%';
        if (pctEl) pctEl.textContent = pct + '%';
        if (statusEl) statusEl.textContent = label;
    }
    function trackFetch(url, label, fallback) {
        return fetchAPI(url).then(function(d){ progress(label); return d; }).catch(function(){ progress(label); return fallback; });
    }
    try {
        const [stockData, storeAreasData, consigStockData] = await Promise.all([
            trackFetch('/api/stock', 'Data stok dimuat…', {}),
            trackFetch('/api/store-areas', 'Data area dimuat…', {}),
            trackFetch('/api/stock/consignment', 'Stok konsinyasi dimuat…', { data: [] }),
        ]);
        allData = stockData;
        storeAreaMap = storeAreasData;
        consignmentStockItems = (consigStockData && consigStockData.data) ? consigStockData.data : [];
        const meta = stockData['_meta'] || {};
        if (meta.snapshot_date) {
            const d = new Date(meta.snapshot_date + 'T00:00:00');
            const opts = { day: 'numeric', month: 'long', year: 'numeric' };
            const el = document.getElementById('data-snapshot-date');
            if (el) el.textContent = d.toLocaleDateString('id-ID', opts);
        }
        initStockByArea();
        if (loadingEl) loadingEl.style.display = 'none';
    } catch (err) {
        console.error('Load failed:', err);
        var statusEl = document.getElementById('loadingStatus');
        if (statusEl) { statusEl.textContent = 'Gagal memuat data: ' + err.message; statusEl.style.color = 'var(--danger)'; }
    }
}

function selectEntity(entity) {
    currentEntity = entity;
    document.querySelectorAll('.entity-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.entity === entity);
    });
    populateSbaFilters();
    renderStockByArea();
}

function sbaUpdateChips() {
    var pairs = [['sbaShowWH','sbaChipWH'],['sbaShowToko','sbaChipToko'],['sbaShowConsig','sbaChipConsig']];
    pairs.forEach(function(p) {
        var cb = document.getElementById(p[0]); var chip = document.getElementById(p[1]);
        if (cb && chip) chip.classList.toggle('on', !!cb.checked);
    });
}

// ============================================================
// STOCK per AREA — aggregates WH + Toko + Consignment per zone
// Bali (Bali+Lombok), Jakarta, Jatim (+Sulawesi+Sumatra+Batam)
// ============================================================
var SBA_AREAS = ['Bali','Jakarta','Jatim'];
var sbaCurrentArea = 'Bali';

function sbaWhToArea(whName) {
    if (!whName) return null;
    var n = String(whName).toLowerCase();
    if (n.indexOf('warehouse online') !== -1) return null;
    if (n.indexOf('palembang') !== -1) return null;
    if (n.indexOf('bali') !== -1 || n.indexOf('lombok') !== -1 || n.indexOf('mataram') !== -1) return 'Bali';
    if (n.indexOf('pluit') !== -1 || n.indexOf('jakarta') !== -1) return 'Jakarta';
    if (n.indexOf('pusat') !== -1 || n.indexOf('surabaya') !== -1 || n.indexOf('jatim') !== -1 || n.indexOf('malang') !== -1
        || n.indexOf('makassar') !== -1 || n.indexOf('manado') !== -1 || n.indexOf('sulawesi') !== -1
        || n.indexOf('sumatra') !== -1 || n.indexOf('medan') !== -1
        || n.indexOf('batam') !== -1) return 'Jatim';
    return null;
}

function sbaStoreMapArea(mapArea) {
    if (!mapArea) return null;
    var a = String(mapArea).toLowerCase().trim();
    if (a.indexOf('bali') === 0
        || a === 'konsinyasi bali' || a === 'warehouse bali' || a === 'whb' || a === 'whb protol' || a === 'wholesale bali'
        || a === 'lombok' || a === 'konsinyasi lombok' || a === 'wholesale lombok') return 'Bali';
    if (a === 'jakarta' || a === 'konsinyasi jakarta' || a === 'warehouse jakarta' || a === 'whj' || a === 'online jakarta' || a === 'online') return 'Jakarta';
    if (a === 'jatim' || a === 'konsinyasi jatim' || a === 'wholesale jatim'
        || a === 'sulawesi'
        || a === 'sumatra' || a === 'palembang' || a === 'whs' || a === 'whs protol'
        || a === 'batam') return 'Jatim';
    return null;
}

function sbaIsConsigArea(mapArea) {
    if (!mapArea) return false;
    return String(mapArea).toLowerCase().indexOf('konsinyasi') === 0;
}

function initStockByArea() {
    var tabsEl = document.getElementById('sbaAreaTabs');
    if (tabsEl) {
        tabsEl.innerHTML = SBA_AREAS.map(function(a) {
            var active = (a === sbaCurrentArea);
            return '<button class="tab-btn' + (active ? ' active' : '') + '" data-area="' + a + '" onclick="switchSbaArea(\'' + a + '\')">' + a + '</button>';
        }).join('');
    }
    populateSbaFilters();
    renderStockByArea();
}

function switchSbaArea(area) {
    sbaCurrentArea = area;
    var btns = document.querySelectorAll('.tab-btn[data-area]');
    for (var i = 0; i < btns.length; i++) {
        btns[i].classList.toggle('active', btns[i].dataset.area === area);
    }
    renderStockByArea();
}

function populateSbaFilters() {
    var entData = (allData || {})[currentEntity] || {};
    var all = [].concat(entData.warehouse || [], entData.retail || []);
    var tiers = {}, vers = {};
    all.forEach(function(it) {
        if (it.tier !== undefined && it.tier !== null && it.tier !== '') tiers[String(it.tier)] = true;
        if (it.version !== undefined && it.version !== null && it.version !== '') vers[String(it.version)] = true;
    });
    var tierEl = document.getElementById('sbaTierFilter');
    var verEl = document.getElementById('sbaVersionFilter');
    if (!tierEl || !verEl) return;
    var tierCur = tierEl.value, verCur = verEl.value;
    var tierKeys = Object.keys(tiers).sort(function(a,b){ return (parseInt(a)||0) - (parseInt(b)||0); });
    var verKeys = Object.keys(vers).sort(function(a,b){ return (parseInt(a)||0) - (parseInt(b)||0); });
    tierEl.innerHTML = '<option value="">Semua Tier</option>' + tierKeys.map(function(t){ return '<option value="' + t + '">Tier ' + t + '</option>'; }).join('');
    verEl.innerHTML = '<option value="">Semua Version</option>' + verKeys.map(function(v){ return '<option value="' + v + '">Version ' + v + '</option>'; }).join('');
    tierEl.value = tierCur;
    verEl.value = verCur;
}

function buildStockByAreaRows(area) {
    var entity = currentEntity;
    var entData = (allData || {})[entity] || {};
    var whItems = entData.warehouse || [];
    var retItems = entData.retail || [];
    var consigItems = (consignmentStockItems || []).filter(function(it) {
        return String(it.entity || '').toUpperCase() === String(entity).toUpperCase();
    });
    var areaMap = storeAreaMap || {};
    var byKK = {};
    function ensure(kk, it) {
        if (!byKK[kk]) {
            byKK[kk] = {
                kode: String(it.kode || '').toUpperCase(),
                kode_kecil: String(it.kode_kecil || '').toUpperCase(),
                kode_mix: it.kode_mix || '',
                name: it.name || '',
                size: it.size || '',
                tier: it.tier !== undefined && it.tier !== null ? String(it.tier) : '',
                version: (it.version !== undefined && it.version !== null) ? String(it.version) : '',
                whQty: 0, whStores: {}, tokoQty: 0, tokoStores: {}, consigQty: 0, consigStores: {}
            };
        }
        return byKK[kk];
    }
    whItems.forEach(function(it) {
        var kk = String(it.kode_kecil || '').toLowerCase();
        if (!kk) return;
        var ss = it.store_stock || {};
        Object.keys(ss).forEach(function(wh) {
            if (sbaWhToArea(wh) !== area) return;
            var qty = Number(ss[wh]) || 0;
            if (qty === 0) return;
            var row = ensure(kk, it);
            row.whStores[wh] = (row.whStores[wh] || 0) + qty;
            row.whQty += qty;
        });
    });
    retItems.forEach(function(it) {
        var kk = String(it.kode_kecil || '').toLowerCase();
        if (!kk) return;
        var ss = it.store_stock || {};
        Object.keys(ss).forEach(function(st) {
            var ma = areaMap[String(st).toLowerCase()];
            if (!ma) return;
            if (sbaStoreMapArea(ma) !== area) return;
            if (sbaIsConsigArea(ma)) return;
            var qty = Number(ss[st]) || 0;
            if (qty === 0) return;
            var row = ensure(kk, it);
            row.tokoStores[st] = (row.tokoStores[st] || 0) + qty;
            row.tokoQty += qty;
        });
    });
    consigItems.forEach(function(it) {
        var kk = String(it.kode_kecil || '').toLowerCase();
        if (!kk) return;
        var ss = it.store_stock || {};
        Object.keys(ss).forEach(function(st) {
            var ma = areaMap[String(st).toLowerCase()];
            var areaGroup = sbaStoreMapArea(ma);
            if (areaGroup !== area) return;
            var qty = Number(ss[st]) || 0;
            if (qty === 0) return;
            var row = ensure(kk, it);
            row.consigStores[st] = (row.consigStores[st] || 0) + qty;
            row.consigQty += qty;
        });
    });
    var out = [];
    Object.keys(byKK).forEach(function(kk) {
        var r = byKK[kk];
        r.total = r.whQty + r.tokoQty + r.consigQty;
        out.push(r);
    });
    return out;
}

function _sbaShortStore(name) {
    if (!name) return '';
    return String(name).replace(/^Zuma\s+/i, '').replace(/^ZUMA\s+/i, '');
}
function _sbaEsc(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildSbaColumns(area) {
    var entity = currentEntity;
    var entData = (allData || {})[entity] || {};
    var areaMap = storeAreaMap || {};
    var whSet = {}, tokoSet = {}, consigSet = {};
    (entData.warehouse || []).forEach(function(it) {
        Object.keys(it.store_stock || {}).forEach(function(wh) {
            if (sbaWhToArea(wh) === area) whSet[wh] = true;
        });
    });
    (entData.retail || []).forEach(function(it) {
        Object.keys(it.store_stock || {}).forEach(function(st) {
            var ma = areaMap[String(st).toLowerCase()];
            if (!ma) return;
            if (sbaStoreMapArea(ma) !== area) return;
            if (sbaIsConsigArea(ma)) return;
            tokoSet[st] = true;
        });
    });
    (consignmentStockItems || []).forEach(function(it) {
        if (String(it.entity || '').toUpperCase() !== String(entity).toUpperCase()) return;
        Object.keys(it.store_stock || {}).forEach(function(st) {
            var ma = areaMap[String(st).toLowerCase()];
            if (sbaStoreMapArea(ma) === area) consigSet[st] = true;
        });
    });
    function sortCI(a, b) { return String(a).toLowerCase().localeCompare(String(b).toLowerCase()); }
    return {
        wh: Object.keys(whSet).sort(sortCI),
        toko: Object.keys(tokoSet).sort(sortCI),
        consig: Object.keys(consigSet).sort(sortCI)
    };
}

function _sbaCellColor(q) {
    if (q <= 0) return { bg: '#fef2f2', fg: '#991b1b' };
    if (q <= 5) return { bg: '#fffbeb', fg: '#92400e' };
    return { bg: '#ecfdf5', fg: '#065f46' };
}

function renderStockByArea() {
    var area = sbaCurrentArea;
    var rows = buildStockByAreaRows(area);
    var cols = buildSbaColumns(area);
    var qEl = document.getElementById('sbaSearchInput');
    var tEl = document.getElementById('sbaTierFilter');
    var vEl = document.getElementById('sbaVersionFilter');
    var hEl = document.getElementById('sbaHideEmpty');
    var showWH = (document.getElementById('sbaShowWH') || {}).checked !== false;
    var showToko = (document.getElementById('sbaShowToko') || {}).checked !== false;
    var showConsig = (document.getElementById('sbaShowConsig') || {}).checked !== false;
    var q = qEl ? (qEl.value || '').toLowerCase().trim() : '';
    var tierF = tEl ? tEl.value : '';
    var verF = vEl ? vEl.value : '';
    var hideEmpty = hEl ? hEl.checked : false;

    function rowVisibleTotal(r) {
        return (showWH ? r.whQty : 0) + (showToko ? r.tokoQty : 0) + (showConsig ? r.consigQty : 0);
    }

    var filtered = rows.filter(function(r) {
        if (hideEmpty && rowVisibleTotal(r) === 0) return false;
        if (tierF && String(r.tier) !== tierF) return false;
        if (verF && String(r.version) !== verF) return false;
        if (q) {
            var hay = (r.kode + '|' + r.kode_kecil + '|' + r.name).toLowerCase();
            if (hay.indexOf(q) === -1) return false;
        }
        return true;
    });
    filtered.sort(function(a, b) { return rowVisibleTotal(b) - rowVisibleTotal(a); });

    var sumQty = 0, sumWh = 0, sumToko = 0, sumConsig = 0;
    filtered.forEach(function(r) {
        sumWh += r.whQty; sumToko += r.tokoQty; sumConsig += r.consigQty;
        sumQty += rowVisibleTotal(r);
    });

    var sumEl = document.getElementById('sbaSummary');
    if (sumEl) {
        var fmt = function(n) { return Number(n).toLocaleString('id-ID'); };
        sumEl.innerHTML =
            '<div class="kpi-card kpi-primary"><div class="kpi-label">Total SKU · ' + _sbaEsc(area) + '</div><div><span class="kpi-value-wrap"><span class="kpi-value tabular">' + fmt(filtered.length) + '</span></span></div><div class="kpi-sub">Entity ' + _sbaEsc(currentEntity) + '</div></div>' +
            '<div class="kpi-card"><div class="kpi-label">Total Qty Tampil</div><div><span class="kpi-value-wrap"><span class="kpi-value tabular">' + fmt(sumQty) + '</span></span></div><div class="kpi-sub">WH + Retail + Consig (aktif)</div></div>' +
            '<div class="kpi-card"><div class="kpi-label">Warehouse' + (showWH ? '' : ' · OFF') + '</div><div><span class="kpi-value-wrap"><span class="kpi-value tabular">' + fmt(sumWh) + '</span></span></div><div class="kpi-sub">' + cols.wh.length + ' lokasi WH</div></div>' +
            '<div class="kpi-card"><div class="kpi-label">Retail' + (showToko ? '' : ' · OFF') + '</div><div><span class="kpi-value-wrap"><span class="kpi-value tabular">' + fmt(sumToko) + '</span></span></div><div class="kpi-sub">' + cols.toko.length + ' toko</div></div>' +
            '<div class="kpi-card"><div class="kpi-label">Consignment' + (showConsig ? '' : ' · OFF') + '</div><div><span class="kpi-value-wrap"><span class="kpi-value tabular">' + fmt(sumConsig) + '</span></span></div><div class="kpi-sub">' + cols.consig.length + ' outlet</div></div>';
    }

    var whLabelMap = { 'Bali': 'WHB', 'Jakarta': 'WHJ', 'Jatim': 'WHS' };
    var whLabel = whLabelMap[area] || ('WH ' + area);

    var HEADER_BG = '#002A3A';
    var STORE_COL_W = 64;

    function storeHeaderCell(label, title) {
        return '<th style="padding:6px 3px;background:' + HEADER_BG + ';color:rgba(255,255,255,0.9);font-weight:700;font-size:9px;text-align:center;min-width:' + STORE_COL_W + 'px;max-width:' + STORE_COL_W + 'px;width:' + STORE_COL_W + 'px;border-right:1px solid rgba(255,255,255,0.06);height:120px;letter-spacing:0.05em;text-transform:uppercase;" title="' + _sbaEsc(title) + '"><div style="writing-mode:vertical-rl;transform:rotate(180deg);padding:4px 0;max-height:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + _sbaEsc(label) + '</div></th>';
    }

    var showTokoCols = showToko ? cols.toko : [];
    var showConsigCols = showConsig ? cols.consig : [];
    var includeWhCol = showWH && cols.wh.length > 0;

    var VER_W = 46, WH_COL_W = 64;
    var stickyMetaTh = [
        { l: 'Kode Barang', w: 92,  align: 'left'   },
        { l: 'Kode Kecil',  w: 104, align: 'left'   },
        { l: 'Nama Barang', w: 210, align: 'left'   },
        { l: 'Size',        w: 46,  align: 'center' },
        { l: 'Tier',        w: 44,  align: 'center' }
    ];
    var leftOffsets = [], cumL = 0;
    for (var mi = 0; mi < stickyMetaTh.length; mi++) { leftOffsets.push(cumL); cumL += stickyMetaTh[mi].w; }
    var VER_LEFT = cumL; cumL += VER_W;
    var WHB_LEFT = cumL;

    var thead = document.getElementById('sbaThead');
    if (thead) {
        var metaStyle = 'background:' + HEADER_BG + ';color:rgba(255,255,255,0.9);padding:8px 8px;font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;border-right:1px solid rgba(255,255,255,0.06);';
        var row1 = '<tr>';
        stickyMetaTh.forEach(function(m, idx) {
            row1 += '<th rowspan="2" style="' + metaStyle + 'text-align:' + m.align + ';min-width:' + m.w + 'px;max-width:' + m.w + 'px;width:' + m.w + 'px;position:sticky;left:' + leftOffsets[idx] + 'px;top:0;z-index:6;">' + m.l + '</th>';
        });
        row1 += '<th rowspan="2" style="' + metaStyle + 'text-align:center;position:sticky;top:0;left:' + VER_LEFT + 'px;z-index:6;min-width:' + VER_W + 'px;max-width:' + VER_W + 'px;width:' + VER_W + 'px;">Ver</th>';
        if (includeWhCol) {
            row1 += '<th rowspan="2" style="' + metaStyle + 'text-align:center;position:sticky;top:0;left:' + WHB_LEFT + 'px;z-index:6;min-width:' + WH_COL_W + 'px;max-width:' + WH_COL_W + 'px;width:' + WH_COL_W + 'px;border-right:2px solid ' + HEADER_BG + ';background:linear-gradient(180deg,' + HEADER_BG + ' 0%,#003c53 100%);color:#00E273;">' + _sbaEsc(whLabel) + '</th>';
        }
        if (showTokoCols.length) {
            row1 += '<th colspan="' + showTokoCols.length + '" style="background:' + HEADER_BG + ';color:rgba(255,255,255,0.85);padding:6px;text-align:center;font-size:9px;font-weight:700;position:sticky;top:0;z-index:4;letter-spacing:0.12em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.08);">Retail ' + _sbaEsc(area) + ' (' + showTokoCols.length + ')</th>';
        }
        if (showConsigCols.length) {
            row1 += '<th colspan="' + showConsigCols.length + '" style="background:' + HEADER_BG + ';color:rgba(255,255,255,0.85);padding:6px;text-align:center;font-size:9px;font-weight:700;position:sticky;top:0;z-index:4;letter-spacing:0.12em;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,0.08);">Consignment ' + _sbaEsc(area) + ' (' + showConsigCols.length + ')</th>';
        }
        row1 += '<th rowspan="2" style="' + metaStyle + 'position:sticky;right:0;top:0;z-index:7;text-align:right;border-left:2px solid ' + HEADER_BG + ';">Total</th></tr>';

        var row2 = '<tr>';
        showTokoCols.forEach(function(n) { row2 += storeHeaderCell(_sbaShortStore(n), n); });
        showConsigCols.forEach(function(n) { row2 += storeHeaderCell(_sbaShortStore(n), n); });
        row2 += '</tr>';
        thead.innerHTML = row1 + row2;
    }

    var visibleStoreCount = (includeWhCol ? 1 : 0) + showTokoCols.length + showConsigCols.length;
    var totalCols = stickyMetaTh.length + 1 + visibleStoreCount + 1;
    var countEl = document.getElementById('sbaCountInfo');
    if (countEl) countEl.textContent = filtered.length.toLocaleString('id-ID') + ' SKU · ' + sumQty.toLocaleString('id-ID') + ' qty · ' + visibleStoreCount + ' kolom (1 WH · ' + showTokoCols.length + ' toko · ' + showConsigCols.length + ' consig)';

    var tbody = document.getElementById('sbaTbody');
    if (!tbody) return;
    if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="' + totalCols + '" style="text-align:center;padding:60px 20px;color:#9ca3af;font-size:12px;">Tidak ada stok di area ' + _sbaEsc(area) + ' untuk entity ' + _sbaEsc(currentEntity) + '</td></tr>';
        return;
    }
    var CAP = 500;
    var display = filtered.slice(0, CAP);

    function cellQty(q) {
        var c = _sbaCellColor(q);
        return '<td style="padding:5px 6px;text-align:center;font-weight:600;color:' + c.fg + ';font-size:11px;background:' + c.bg + ';min-width:' + STORE_COL_W + 'px;max-width:' + STORE_COL_W + 'px;width:' + STORE_COL_W + 'px;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;font-variant-numeric:tabular-nums;">' + q.toLocaleString('id-ID') + '</td>';
    }
    function cellWhAgg(q) {
        var c = _sbaCellColor(q);
        return '<td style="padding:5px 6px;text-align:center;font-weight:700;color:' + c.fg + ';font-size:11.5px;background:' + c.bg + ';min-width:' + WH_COL_W + 'px;max-width:' + WH_COL_W + 'px;width:' + WH_COL_W + 'px;position:sticky;left:' + WHB_LEFT + 'px;z-index:2;border-right:2px solid #cbd5e1;border-bottom:1px solid #f1f5f9;font-variant-numeric:tabular-nums;">' + q.toLocaleString('id-ID') + '</td>';
    }

    var html = display.map(function(r, idx) {
        var rowBg = idx % 2 === 0 ? '#ffffff' : '#fafbfc';
        var rowTotal = rowVisibleTotal(r);
        var out = '<tr>';
        out += '<td style="padding:6px 8px;font-weight:600;color:#0f172a;white-space:nowrap;background:' + rowBg + ';position:sticky;left:' + leftOffsets[0] + 'px;z-index:1;border-right:1px solid #e5e7eb;border-bottom:1px solid #f1f5f9;font-size:11px;min-width:' + stickyMetaTh[0].w + 'px;max-width:' + stickyMetaTh[0].w + 'px;width:' + stickyMetaTh[0].w + 'px;font-family:ui-monospace,monospace;">' + _sbaEsc(r.kode || '—') + '</td>';
        out += '<td style="padding:6px 8px;font-family:ui-monospace,monospace;font-size:10.5px;color:#334155;white-space:nowrap;background:' + rowBg + ';position:sticky;left:' + leftOffsets[1] + 'px;z-index:1;border-right:1px solid #e5e7eb;border-bottom:1px solid #f1f5f9;min-width:' + stickyMetaTh[1].w + 'px;max-width:' + stickyMetaTh[1].w + 'px;width:' + stickyMetaTh[1].w + 'px;">' + _sbaEsc(r.kode_kecil || '—') + '</td>';
        out += '<td style="padding:6px 8px;color:#1f2937;background:' + rowBg + ';position:sticky;left:' + leftOffsets[2] + 'px;z-index:1;border-right:1px solid #e5e7eb;border-bottom:1px solid #f1f5f9;font-size:11px;min-width:' + stickyMetaTh[2].w + 'px;max-width:' + stickyMetaTh[2].w + 'px;width:' + stickyMetaTh[2].w + 'px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + _sbaEsc(r.name) + '">' + _sbaEsc(r.name) + '</td>';
        out += '<td style="padding:6px 8px;text-align:center;color:#64748b;background:' + rowBg + ';position:sticky;left:' + leftOffsets[3] + 'px;z-index:1;border-right:1px solid #e5e7eb;border-bottom:1px solid #f1f5f9;font-size:11px;min-width:' + stickyMetaTh[3].w + 'px;max-width:' + stickyMetaTh[3].w + 'px;width:' + stickyMetaTh[3].w + 'px;">' + _sbaEsc(r.size) + '</td>';
        out += '<td style="padding:6px 8px;text-align:center;color:#334155;background:' + rowBg + ';position:sticky;left:' + leftOffsets[4] + 'px;z-index:1;border-right:1px solid #e5e7eb;border-bottom:1px solid #f1f5f9;font-size:11px;min-width:' + stickyMetaTh[4].w + 'px;max-width:' + stickyMetaTh[4].w + 'px;width:' + stickyMetaTh[4].w + 'px;">' + _sbaEsc(r.tier || '—') + '</td>';
        out += '<td style="padding:6px 8px;text-align:center;color:#64748b;background:' + rowBg + ';position:sticky;left:' + VER_LEFT + 'px;z-index:1;border-right:' + (includeWhCol ? '1px solid #e5e7eb' : '2px solid #cbd5e1') + ';border-bottom:1px solid #f1f5f9;font-size:11px;min-width:' + VER_W + 'px;max-width:' + VER_W + 'px;width:' + VER_W + 'px;">' + _sbaEsc(r.version || '—') + '</td>';
        if (includeWhCol) out += cellWhAgg(r.whQty);
        for (var j = 0; j < showTokoCols.length; j++)  out += cellQty(r.tokoStores[showTokoCols[j]] || 0);
        for (var k = 0; k < showConsigCols.length; k++) out += cellQty(r.consigStores[showConsigCols[k]] || 0);
        out += '<td style="padding:6px 10px;text-align:right;font-weight:700;color:#002A3A;background:' + rowBg + ';position:sticky;right:0;z-index:1;border-left:2px solid #cbd5e1;border-bottom:1px solid #f1f5f9;font-size:11.5px;font-variant-numeric:tabular-nums;">' + rowTotal.toLocaleString('id-ID') + '</td>';
        out += '</tr>';
        return out;
    }).join('');

    if (filtered.length > CAP) {
        html += '<tr><td colspan="' + totalCols + '" style="text-align:center;padding:12px;background:#fffbeb;color:#92400e;font-weight:600;font-size:11px;">Menampilkan ' + CAP + ' dari ' + filtered.length.toLocaleString('id-ID') + ' baris. Persempit pakai search / filter, atau Export CSV untuk data lengkap.</td></tr>';
    }
    tbody.innerHTML = html;
}

function exportStockByAreaCSV() {
    var area = sbaCurrentArea;
    var rows = buildStockByAreaRows(area);
    var qEl = document.getElementById('sbaSearchInput');
    var tEl = document.getElementById('sbaTierFilter');
    var vEl = document.getElementById('sbaVersionFilter');
    var hEl = document.getElementById('sbaHideEmpty');
    var showWH = (document.getElementById('sbaShowWH') || {}).checked !== false;
    var showToko = (document.getElementById('sbaShowToko') || {}).checked !== false;
    var showConsig = (document.getElementById('sbaShowConsig') || {}).checked !== false;
    var q = qEl ? (qEl.value || '').toLowerCase().trim() : '';
    var tierF = tEl ? tEl.value : '';
    var verF = vEl ? vEl.value : '';
    var hideEmpty = hEl ? hEl.checked : false;
    function rowVisTot(r) { return (showWH ? r.whQty : 0) + (showToko ? r.tokoQty : 0) + (showConsig ? r.consigQty : 0); }
    var filtered = rows.filter(function(r) {
        if (hideEmpty && rowVisTot(r) === 0) return false;
        if (tierF && String(r.tier) !== tierF) return false;
        if (verF && String(r.version) !== verF) return false;
        if (q) {
            var hay = (r.kode + '|' + r.kode_kecil + '|' + r.name).toLowerCase();
            if (hay.indexOf(q) === -1) return false;
        }
        return true;
    });
    filtered.sort(function(a, b) { return rowVisTot(b) - rowVisTot(a); });
    var cols = buildSbaColumns(area);
    var whCols = showWH ? cols.wh : [];
    var tokoCols = showToko ? cols.toko : [];
    var consigCols = showConsig ? cols.consig : [];
    var headers = ['Kode','Kode Kecil','Nama','Size','Tier','Version']
        .concat(whCols.map(function(n) { return 'WH: ' + n; }))
        .concat(tokoCols.map(function(n) { return 'Toko: ' + n; }))
        .concat(consigCols.map(function(n) { return 'Consig: ' + n; }))
        .concat(['Total']);
    function esc(v) { return '"' + String(v == null ? '' : v).replace(/"/g, '""') + '"'; }
    var out = [headers.map(esc).join(',')];
    filtered.forEach(function(r) {
        var row = [r.kode, r.kode_kecil, r.name, r.size, r.tier, r.version];
        whCols.forEach(function(n) { row.push(r.whStores[n] || 0); });
        tokoCols.forEach(function(n) { row.push(r.tokoStores[n] || 0); });
        consigCols.forEach(function(n) { row.push(r.consigStores[n] || 0); });
        row.push(rowVisTot(r));
        out.push(row.map(esc).join(','));
    });
    var blob = new Blob(['﻿' + out.join('\n')], { type: 'text/csv;charset=utf-8' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'stok_' + String(area).toLowerCase() + '_' + currentEntity + '_' + new Date().toISOString().slice(0, 10) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}
